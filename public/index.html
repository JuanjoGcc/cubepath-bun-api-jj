<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cubepath AI Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="layout">
      <section class="panel hero reveal">
        <p class="eyebrow">Bun + OpenRouter</p>
        <h1>Prueba tu API de IA en segundos</h1>
        <p class="subtitle">
          Escribe un mensaje y prueba <strong>POST /chat</strong> desde esta landing minimalista.
        </p>
        <div class="quick-check">
          <button id="healthBtn" type="button" class="ghost-btn">Probar /health</button>
          <span id="healthResult" class="health-result">Sin verificar</span>
        </div>
      </section>

      <section class="panel reveal delay-1">
        <form id="chatForm" class="chat-form">
          <label for="message">Mensaje</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="Ejemplo: Dame 3 ideas de nombres para una app de productividad"
            required
          ></textarea>

          <div class="row">
            <div class="field">
              <label for="model">Modelo</label>
              <input id="model" name="model" type="text" value="openrouter/free" />
            </div>
            <label class="checkbox">
              <input id="stream" name="stream" type="checkbox" />
              <span>Usar stream (agregado por backend)</span>
            </label>
          </div>

          <button id="sendBtn" type="submit" class="primary-btn">Enviar a /chat</button>
        </form>
      </section>

      <section class="panel reveal delay-2">
        <div class="result-head">
          <h2>Respuesta</h2>
          <span id="statusBadge" class="badge">Listo</span>
        </div>

        <pre id="responseBox" class="response-box">Aun no hay respuesta.</pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
